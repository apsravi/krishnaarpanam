<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <!-- Background glow -->
    <radialGradient id="bgCircle" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF9F0"/>
      <stop offset="70%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </radialGradient>
    <!-- Deep petal gradient -->
    <radialGradient id="petalBack" cx="50%" cy="85%" r="65%">
      <stop offset="0%" stop-color="#F8BBD9"/>
      <stop offset="45%" stop-color="#EC407A"/>
      <stop offset="100%" stop-color="#AD1457"/>
    </radialGradient>
    <!-- Mid petal gradient -->
    <radialGradient id="petalMid" cx="45%" cy="75%" r="62%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="40%" stop-color="#F48FB1"/>
      <stop offset="100%" stop-color="#C2185B"/>
    </radialGradient>
    <!-- Front petal gradient -->
    <radialGradient id="petalFront" cx="42%" cy="65%" r="68%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="30%" stop-color="#FCE4EC"/>
      <stop offset="75%" stop-color="#F48FB1"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </radialGradient>
    <!-- Petal sheen highlight -->
    <linearGradient id="sheen" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <!-- Center stamen golden -->
    <radialGradient id="stamen" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="40%" stop-color="#FFD54F"/>
      <stop offset="80%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#E65100"/>
    </radialGradient>
    <!-- Lily pad green -->
    <radialGradient id="pad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#C8E6C9"/>
      <stop offset="60%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </radialGradient>
    <!-- Water surface -->
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B3E5FC" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0288D1" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="petalGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="centerGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#E91E63" flood-opacity="0.18"/>
    </filter>
    <filter id="leafShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1B5E20" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- === WATER SURFACE === -->
  <ellipse cx="140" cy="220" rx="95" ry="22" fill="url(#water)"/>
  <ellipse cx="140" cy="222" rx="75" ry="15" fill="#81D4FA" opacity="0.18"/>
  <!-- Water shimmer lines -->
  <ellipse cx="115" cy="220" rx="18" ry="4" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.35"/>
  <ellipse cx="165" cy="224" rx="14" ry="3" fill="none" stroke="#fff" stroke-width="1" opacity="0.25"/>
  <ellipse cx="140" cy="228" rx="35" ry="5" fill="none" stroke="#81D4FA" stroke-width="0.8" opacity="0.3"/>

  <!-- === LILY PAD === -->
  <ellipse cx="140" cy="214" rx="88" ry="22" fill="url(#pad)" filter="url(#leafShadow)"/>
  <ellipse cx="140" cy="214" rx="88" ry="22" fill="none" stroke="#1B5E20" stroke-width="1.2" opacity="0.4"/>
  <!-- Notch in lily pad (realistic) -->
  <path d="M140,194 L140,215" stroke="#1B5E20" stroke-width="1.5" opacity="0.35"/>
  <!-- Veins radiating from center -->
  <g stroke="#2E7D32" stroke-width="0.9" opacity="0.35">
    <line x1="140" y1="195" x2="68"  y2="212"/>
    <line x1="140" y1="195" x2="90"  y2="205"/>
    <line x1="140" y1="195" x2="115" y2="200"/>
    <line x1="140" y1="195" x2="165" y2="200"/>
    <line x1="140" y1="195" x2="190" y2="205"/>
    <line x1="140" y1="195" x2="212" y2="212"/>
    <line x1="140" y1="195" x2="140" y2="225"/>
  </g>
  <!-- Pad highlight -->
  <ellipse cx="120" cy="208" rx="30" ry="8" fill="rgba(255,255,255,0.18)" transform="rotate(-10 120 208)"/>
  <!-- Water droplet on pad -->
  <ellipse cx="95" cy="217" rx="5" ry="3" fill="rgba(255,255,255,0.55)"/>
  <ellipse cx="175" cy="220" rx="4" ry="2.5" fill="rgba(255,255,255,0.45)"/>
  <ellipse cx="155" cy="210" rx="3" ry="2" fill="rgba(255,255,255,0.4)"/>

  <!-- === OUTER PETALS — 8 petals, back layer === -->
  <g filter="url(#shadow)">
    <!-- Petal angles: evenly spread, tilted outward -->
    <ellipse cx="140" cy="150" rx="18" ry="52" fill="url(#petalBack)" opacity="0.78" transform="rotate(-72 140 150) translate(0 -20)"/>
    <ellipse cx="140" cy="150" rx="18" ry="52" fill="url(#petalBack)" opacity="0.78" transform="rotate(-48 140 150) translate(0 -20)"/>
    <ellipse cx="140" cy="150" rx="18" ry="52" fill="url(#petalBack)" opacity="0.8"  transform="rotate(-24 140 150) translate(0 -20)"/>
    <ellipse cx="140" cy="150" rx="18" ry="52" fill="url(#petalBack)" opacity="0.82" transform="rotate(0   140 150) translate(0 -22)"/>
    <ellipse cx="140" cy="150" rx="18" ry="52" fill="url(#petalBack)" opacity="0.8"  transform="rotate(24  140 150) translate(0 -20)"/>
    <ellipse cx="140" cy="150" rx="18" ry="52" fill="url(#petalBack)" opacity="0.78" transform="rotate(48  140 150) translate(0 -20)"/>
    <ellipse cx="140" cy="150" rx="18" ry="52" fill="url(#petalBack)" opacity="0.78" transform="rotate(72  140 150) translate(0 -20)"/>
  </g>

  <!-- === MID PETALS — 6 petals === -->
  <g filter="url(#petalGlow)">
    <ellipse cx="140" cy="150" rx="16" ry="47" fill="url(#petalMid)" transform="rotate(-54 140 150) translate(0 -16)"/>
    <ellipse cx="140" cy="150" rx="16" ry="47" fill="url(#petalMid)" transform="rotate(-27 140 150) translate(0 -16)"/>
    <ellipse cx="140" cy="150" rx="16" ry="47" fill="url(#petalMid)" transform="rotate(0   140 150) translate(0 -18)"/>
    <ellipse cx="140" cy="150" rx="16" ry="47" fill="url(#petalMid)" transform="rotate(27  140 150) translate(0 -16)"/>
    <ellipse cx="140" cy="150" rx="16" ry="47" fill="url(#petalMid)" transform="rotate(54  140 150) translate(0 -16)"/>
  </g>

  <!-- === INNER / FRONT PETALS — 5 petals, lighter === -->
  <g filter="url(#petalGlow)">
    <ellipse cx="140" cy="150" rx="13" ry="40" fill="url(#petalFront)" transform="rotate(-40 140 150) translate(0 -12)"/>
    <ellipse cx="140" cy="150" rx="13" ry="40" fill="url(#petalFront)" transform="rotate(-20 140 150) translate(0 -12)"/>
    <ellipse cx="140" cy="150" rx="14" ry="42" fill="url(#petalFront)" transform="rotate(0   140 150) translate(0 -14)"/>
    <ellipse cx="140" cy="150" rx="13" ry="40" fill="url(#petalFront)" transform="rotate(20  140 150) translate(0 -12)"/>
    <ellipse cx="140" cy="150" rx="13" ry="40" fill="url(#petalFront)" transform="rotate(40  140 150) translate(0 -12)"/>
  </g>

  <!-- === PETAL SHEENS (light gloss on front petals) === -->
  <ellipse cx="140" cy="150" rx="5"  ry="20" fill="url(#sheen)" transform="rotate(-40 140 150) translate(-3 -12)" opacity="0.7"/>
  <ellipse cx="140" cy="150" rx="5"  ry="20" fill="url(#sheen)" transform="rotate(0   140 150) translate(0  -14)" opacity="0.65"/>
  <ellipse cx="140" cy="150" rx="5"  ry="20" fill="url(#sheen)" transform="rotate(40  140 150) translate(3  -12)" opacity="0.7"/>

  <!-- === CENTER STAMEN DISC === -->
  <circle cx="140" cy="148" r="24" fill="url(#stamen)" filter="url(#centerGlow)"/>
  <circle cx="140" cy="148" r="24" fill="none" stroke="#FFB300" stroke-width="1.5" opacity="0.6"/>
  <!-- Stamen dots ring -->
  <g fill="#BF360C" opacity="0.9">
    <circle cx="140" cy="127" r="2.5"/>
    <circle cx="152" cy="131" r="2.2"/>
    <circle cx="160" cy="142" r="2.2"/>
    <circle cx="157" cy="155" r="2.2"/>
    <circle cx="148" cy="163" r="2.5"/>
    <circle cx="132" cy="163" r="2.5"/>
    <circle cx="123" cy="155" r="2.2"/>
    <circle cx="120" cy="142" r="2.2"/>
    <circle cx="128" cy="131" r="2.2"/>
  </g>
  <!-- Center dot -->
  <circle cx="140" cy="148" r="7" fill="#E65100" filter="url(#centerGlow)"/>
  <circle cx="140" cy="148" r="4" fill="#FFCC02"/>
  <!-- Center highlight -->
  <ellipse cx="136" cy="143" rx="5" ry="4" fill="rgba(255,255,255,0.45)"/>

  <!-- === DECORATIVE OUTER RING (elegant circle border) === -->
  <circle cx="140" cy="140" r="128" fill="none" stroke="rgba(233,30,99,0.08)" stroke-width="2"/>
  <circle cx="140" cy="140" r="132" fill="none" stroke="rgba(233,30,99,0.05)" stroke-width="3"/>
</svg>
