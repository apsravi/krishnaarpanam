<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C8E6C9"/>
      <stop offset="100%" stop-color="#81C784"/>
    </radialGradient>
    <radialGradient id="petalPink" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="50%" stop-color="#F48FB1"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </radialGradient>
    <radialGradient id="petalDeep" cx="50%" cy="70%" r="65%">
      <stop offset="0%" stop-color="#F8BBD9"/>
      <stop offset="60%" stop-color="#EC407A"/>
      <stop offset="100%" stop-color="#C2185B"/>
    </radialGradient>
    <radialGradient id="petalLight" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#F48FB1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="60%" stop-color="#FFEE58"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </radialGradient>
    <radialGradient id="leafGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#E91E63" flood-opacity="0.25"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle — lily pad green -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="#66BB6A" stroke-width="1.5" opacity="0.6"/>

  <!-- Lily pad / water surface -->
  <ellipse cx="100" cy="148" rx="72" ry="18" fill="url(#leafGrad)" opacity="0.85"/>
  <ellipse cx="100" cy="148" rx="72" ry="18" fill="none" stroke="#2E7D32" stroke-width="0.8" opacity="0.5"/>
  <!-- Lily pad veins -->
  <line x1="100" y1="132" x2="100" y2="163" stroke="#2E7D32" stroke-width="0.8" opacity="0.4"/>
  <line x1="56" y1="145" x2="100" y2="132" stroke="#2E7D32" stroke-width="0.6" opacity="0.35"/>
  <line x1="144" y1="145" x2="100" y2="132" stroke="#2E7D32" stroke-width="0.6" opacity="0.35"/>
  <line x1="40" y1="149" x2="100" y2="140" stroke="#2E7D32" stroke-width="0.5" opacity="0.3"/>
  <line x1="160" y1="149" x2="100" y2="140" stroke="#2E7D32" stroke-width="0.5" opacity="0.3"/>

  <!-- === BACK LAYER PETALS (outer ring) === -->
  <!-- Petal 1 - back left -->
  <ellipse cx="100" cy="100" rx="16" ry="42" fill="url(#petalDeep)"
    transform="rotate(-70 100 100) translate(0 -28)" opacity="0.75" filter="url(#softShadow)"/>
  <!-- Petal 2 - back right -->
  <ellipse cx="100" cy="100" rx="16" ry="42" fill="url(#petalDeep)"
    transform="rotate(70 100 100) translate(0 -28)" opacity="0.75" filter="url(#softShadow)"/>
  <!-- Petal 3 - back top-left -->
  <ellipse cx="100" cy="100" rx="16" ry="42" fill="url(#petalDeep)"
    transform="rotate(-35 100 100) translate(0 -28)" opacity="0.72"/>
  <!-- Petal 4 - back top-right -->
  <ellipse cx="100" cy="100" rx="16" ry="42" fill="url(#petalDeep)"
    transform="rotate(35 100 100) translate(0 -28)" opacity="0.72"/>
  <!-- Petal 5 - back top -->
  <ellipse cx="100" cy="100" rx="16" ry="44" fill="url(#petalDeep)"
    transform="rotate(0 100 100) translate(0 -30)" opacity="0.7"/>

  <!-- === MID LAYER PETALS === -->
  <ellipse cx="100" cy="100" rx="14" ry="40" fill="url(#petalPink)"
    transform="rotate(-55 100 100) translate(0 -24)" filter="url(#softShadow)"/>
  <ellipse cx="100" cy="100" rx="14" ry="40" fill="url(#petalPink)"
    transform="rotate(55 100 100) translate(0 -24)" filter="url(#softShadow)"/>
  <ellipse cx="100" cy="100" rx="14" ry="40" fill="url(#petalPink)"
    transform="rotate(-20 100 100) translate(0 -24)"/>
  <ellipse cx="100" cy="100" rx="14" ry="40" fill="url(#petalPink)"
    transform="rotate(20 100 100) translate(0 -24)"/>
  <!-- Top center mid petal -->
  <ellipse cx="100" cy="100" rx="15" ry="42" fill="url(#petalPink)"
    transform="rotate(0 100 100) translate(0 -26)" filter="url(#softShadow)"/>

  <!-- === FRONT LAYER PETALS (inner ring, lighter) === -->
  <ellipse cx="100" cy="100" rx="12" ry="36" fill="url(#petalPink)"
    transform="rotate(-40 100 100) translate(0 -18)" filter="url(#glow)"/>
  <ellipse cx="100" cy="100" rx="12" ry="36" fill="url(#petalPink)"
    transform="rotate(40 100 100) translate(0 -18)" filter="url(#glow)"/>
  <ellipse cx="100" cy="100" rx="11" ry="34" fill="url(#petalPink)"
    transform="rotate(0 100 100) translate(0 -18)" filter="url(#glow)"/>

  <!-- Petal highlights (light sheen on each petal) -->
  <ellipse cx="100" cy="100" rx="5" ry="18" fill="url(#petalLight)"
    transform="rotate(-40 100 100) translate(-3 -18)" opacity="0.7"/>
  <ellipse cx="100" cy="100" rx="5" ry="18" fill="url(#petalLight)"
    transform="rotate(40 100 100) translate(3 -18)" opacity="0.7"/>
  <ellipse cx="100" cy="100" rx="5" ry="20" fill="url(#petalLight)"
    transform="rotate(0 100 100) translate(0 -18)" opacity="0.6"/>

  <!-- === CENTER — golden pollen disc === -->
  <circle cx="100" cy="98" r="18" fill="url(#centerGrad)" filter="url(#glow)"/>
  <circle cx="100" cy="98" r="18" fill="none" stroke="#F9A825" stroke-width="1.2" opacity="0.7"/>
  <!-- Pollen dots -->
  <g fill="#F57F17" opacity="0.85">
    <circle cx="100" cy="85" r="2"/>
    <circle cx="107" cy="88" r="1.8"/>
    <circle cx="111" cy="95" r="1.8"/>
    <circle cx="109" cy="103" r="1.8"/>
    <circle cx="100" cy="107" r="2"/>
    <circle cx="91" cy="103" r="1.8"/>
    <circle cx="89" cy="95" r="1.8"/>
    <circle cx="93" cy="88" r="1.8"/>
  </g>
  <!-- Center glow -->
  <circle cx="97" cy="94" r="7" fill="white" opacity="0.35"/>

  <!-- Water droplets on lily pad -->
  <ellipse cx="78" cy="152" rx="4" ry="2.5" fill="rgba(255,255,255,0.5)"/>
  <ellipse cx="125" cy="155" rx="3" ry="2" fill="rgba(255,255,255,0.4)"/>

  <!-- Outer decorative ring -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="rgba(233,30,99,0.2)" stroke-width="2" stroke-dasharray="6,4"/>
</svg>
