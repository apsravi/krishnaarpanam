<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFE082"/>
      <stop offset="40%"  stop-color="#FFB300"/>
      <stop offset="75%"  stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Main body of Pillayar Suzhi:
       Starts top-right with a clockwise loop (the small circle at top)
       Then sweeps down and left in a large "2" shape
       The bottom tail extends left under the horizontal lines -->

  <!-- Small circle/loop at top-right -->
  <path
    d="M 130,30
       C 145,30 155,40 155,55
       C 155,70 145,80 130,80
       C 118,80 110,73 108,63
       C 106,52 113,43 122,42
       C 130,41 136,47 135,55
       C 134,62 128,65 122,63"
    stroke="url(#g)" stroke-width="14" stroke-linecap="round" fill="none"
    filter="url(#glow)"
  />

  <!-- Main sweeping curve down and left — the "2" body -->
  <path
    d="M 108,63
       C 100,75 85,85 70,100
       C 55,115 45,125 40,135"
    stroke="url(#g)" stroke-width="14" stroke-linecap="round" fill="none"
    filter="url(#glow)"
  />

  <!-- Tail sweeping left at the bottom -->
  <path
    d="M 40,135
       C 35,140 28,143 22,143"
    stroke="url(#g)" stroke-width="13" stroke-linecap="round" fill="none"
    filter="url(#glow)"
  />

  <!-- 4 horizontal lines — like the reference image stacked lines -->
  <line x1="18" y1="155" x2="165" y2="155" stroke="url(#g)" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="18" y1="172" x2="158" y2="172" stroke="url(#g)" stroke-width="8"  stroke-linecap="round" filter="url(#glow)"/>
  <line x1="18" y1="187" x2="148" y2="187" stroke="url(#g)" stroke-width="6.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="18" y1="200" x2="135" y2="200" stroke="url(#g)" stroke-width="5"  stroke-linecap="round" filter="url(#glow)"/>

  <!-- Bindu — dot below -->
  <circle cx="90" cy="220" r="6" fill="url(#g)" filter="url(#glow)"/>
</svg>