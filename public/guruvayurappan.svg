<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <radialGradient id="haloGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="60%" stop-color="#FFA000"/>
      <stop offset="100%" stop-color="#E65100" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="skinGrad" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#0277BD"/>
    </radialGradient>
    <radialGradient id="crownGrad" cx="50%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="lotusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F48FB1"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </linearGradient>
    <linearGradient id="vastrGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
  </defs>

  <!-- Divine halo / Prabhamandala -->
  <circle cx="100" cy="88" r="52" fill="url(#haloGrad)" opacity="0.85" filter="url(#glow)"/>
  <circle cx="100" cy="88" r="48" fill="none" stroke="#FFD700" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <circle cx="100" cy="88" r="54" fill="none" stroke="#FFA000" stroke-width="0.8" opacity="0.5"/>

  <!-- Rays from halo -->
  <g opacity="0.5" stroke="#FFD700" stroke-width="0.8">
    <line x1="100" y1="34" x2="100" y2="26"/>
    <line x1="121" y1="39" x2="128" y2="33"/>
    <line x1="136" y1="55" x2="144" y2="50"/>
    <line x1="141" y1="78" x2="150" y2="78"/>
    <line x1="136" y1="101" x2="143" y2="107"/>
    <line x1="79" y1="39" x2="72" y2="33"/>
    <line x1="64" y1="55" x2="56" y2="50"/>
    <line x1="59" y1="78" x2="50" y2="78"/>
    <line x1="64" y1="101" x2="57" y2="107"/>
  </g>

  <!-- Tall Kireedam (crown) -->
  <polygon points="100,28 88,48 112,48" fill="url(#crownGrad)" stroke="#FF8F00" stroke-width="0.8"/>
  <rect x="84" y="48" width="32" height="14" rx="2" fill="url(#crownGrad)" stroke="#FF8F00" stroke-width="0.8"/>
  <!-- Crown jewels -->
  <circle cx="100" cy="36" r="3" fill="#E53935"/>
  <circle cx="91" cy="52" r="2" fill="#E53935"/>
  <circle cx="100" cy="54" r="2.5" fill="#43A047"/>
  <circle cx="109" cy="52" r="2" fill="#1565C0"/>
  <!-- Crown base band -->
  <rect x="82" y="60" width="36" height="5" rx="1" fill="#FFB300" stroke="#E65100" stroke-width="0.5"/>

  <!-- Face — divine blue complexion -->
  <ellipse cx="100" cy="85" rx="22" ry="24" fill="url(#skinGrad)" stroke="#0277BD" stroke-width="0.5"/>

  <!-- Eyes — large, lotus-shaped -->
  <ellipse cx="91" cy="81" rx="7" ry="5" fill="white"/>
  <ellipse cx="109" cy="81" rx="7" ry="5" fill="white"/>
  <circle cx="91" cy="82" r="3.5" fill="#1A237E"/>
  <circle cx="109" cy="82" r="3.5" fill="#1A237E"/>
  <circle cx="92.5" cy="80.5" r="1.2" fill="white"/>
  <circle cx="110.5" cy="80.5" r="1.2" fill="white"/>
  <!-- Eyebrows -->
  <path d="M85,75 Q91,72 97,75" stroke="#1A237E" stroke-width="1.5" fill="none"/>
  <path d="M103,75 Q109,72 115,75" stroke="#1A237E" stroke-width="1.5" fill="none"/>

  <!-- Nose -->
  <ellipse cx="100" cy="89" rx="2" ry="1.5" fill="#0277BD" opacity="0.6"/>
  <!-- Mukha tilak bindi -->
  <ellipse cx="100" cy="78" rx="2" ry="2.5" fill="#E53935"/>

  <!-- Smiling lips -->
  <path d="M93,97 Q100,103 107,97" stroke="#E53935" stroke-width="1.5" fill="#EF9A9A"/>

  <!-- Earrings -->
  <circle cx="78" cy="85" r="4" fill="url(#crownGrad)" stroke="#FF8F00" stroke-width="0.8"/>
  <circle cx="78" cy="85" r="2" fill="#E53935"/>
  <circle cx="122" cy="85" r="4" fill="url(#crownGrad)" stroke="#FF8F00" stroke-width="0.8"/>
  <circle cx="122" cy="85" r="2" fill="#E53935"/>

  <!-- Neck & necklace -->
  <rect x="93" y="108" width="14" height="10" rx="2" fill="url(#skinGrad)"/>
  <path d="M84,118 Q100,128 116,118" stroke="#FFD700" stroke-width="2.5" fill="none"/>
  <circle cx="100" cy="126" r="3.5" fill="#E53935"/>
  <circle cx="91" cy="122" r="2.5" fill="#FFD700"/>
  <circle cx="109" cy="122" r="2.5" fill="#FFD700"/>

  <!-- Body / Pitambara (yellow silk) -->
  <path d="M75,118 Q65,150 68,200 L132,200 Q135,150 125,118 Z" fill="url(#vastrGrad)" stroke="#FF8C00" stroke-width="0.8"/>
  <!-- Silk sheen lines -->
  <path d="M85,125 Q82,160 84,195" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" fill="none"/>
  <path d="M115,125 Q118,160 116,195" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" fill="none"/>

  <!-- Arms -->
  <!-- Left upper arm -->
  <ellipse cx="68" cy="135" rx="10" ry="22" fill="url(#skinGrad)" transform="rotate(-15,68,135)"/>
  <!-- Right upper arm -->
  <ellipse cx="132" cy="135" rx="10" ry="22" fill="url(#skinGrad)" transform="rotate(15,132,135)"/>

  <!-- Shankha (Conch) — upper left hand -->
  <ellipse cx="55" cy="148" rx="9" ry="14" fill="white" stroke="#B0BEC5" stroke-width="0.8" transform="rotate(-20,55,148)"/>
  <path d="M50,140 Q55,148 60,156" stroke="#90A4AE" stroke-width="1" fill="none"/>
  <path d="M52,143 Q57,150 62,158" stroke="#90A4AE" stroke-width="0.8" fill="none"/>

  <!-- Chakra (Sudarshana) — upper right hand -->
  <circle cx="148" cy="145" r="13" fill="none" stroke="#FFD700" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="148" cy="145" r="8" fill="none" stroke="#FF8C00" stroke-width="1.5"/>
  <circle cx="148" cy="145" r="3" fill="#FF8C00"/>
  <g stroke="#FFD700" stroke-width="1.2" opacity="0.9">
    <line x1="148" y1="132" x2="148" y2="126"/>
    <line x1="157" y1="136" x2="162" y2="132"/>
    <line x1="161" y1="145" x2="167" y2="145"/>
    <line x1="157" y1="154" x2="162" y2="158"/>
    <line x1="148" y1="158" x2="148" y2="164"/>
    <line x1="139" y1="154" x2="134" y2="158"/>
    <line x1="135" y1="145" x2="129" y2="145"/>
    <line x1="139" y1="136" x2="134" y2="132"/>
  </g>

  <!-- Lower left hand — Gada (mace) -->
  <rect x="68" y="162" width="6" height="22" rx="2" fill="#B8860B"/>
  <ellipse cx="71" cy="162" rx="8" ry="6" fill="#FFD700" stroke="#FF8C00" stroke-width="0.8"/>

  <!-- Lower right hand — Padma (lotus) abhaya -->
  <g transform="translate(126,162)">
    <ellipse cx="0" cy="0" rx="8" ry="5" fill="#F48FB1"/>
    <path d="M0,-5 Q5,0 0,8 Q-5,0 0,-5Z" fill="#E91E63" opacity="0.7"/>
    <path d="M-6,0 Q0,-6 6,0" stroke="#F48FB1" stroke-width="1.5" fill="none"/>
    <circle cx="0" cy="2" r="3" fill="#FFD700"/>
  </g>

  <!-- Vaijayantimala (garland) -->
  <path d="M84,120 Q100,140 116,120" stroke="#43A047" stroke-width="2" fill="none"/>
  <g fill="#E91E63">
    <circle cx="88" cy="127" r="2.5"/>
    <circle cx="94" cy="133" r="2.5"/>
    <circle cx="100" cy="136" r="3"/>
    <circle cx="106" cy="133" r="2.5"/>
    <circle cx="112" cy="127" r="2.5"/>
  </g>

  <!-- Lotus base / Padmasana -->
  <ellipse cx="100" cy="205" rx="38" ry="10" fill="#F48FB1" stroke="#E91E63" stroke-width="1"/>
  <ellipse cx="100" cy="200" rx="32" ry="8" fill="#F06292" stroke="#E91E63" stroke-width="0.8"/>
  <!-- Lotus petals -->
  <g fill="#F48FB1" stroke="#E91E63" stroke-width="0.6">
    <ellipse cx="70" cy="202" rx="10" ry="5" transform="rotate(-30,70,202)"/>
    <ellipse cx="82" cy="196" rx="10" ry="5" transform="rotate(-15,82,196)"/>
    <ellipse cx="100" cy="194" rx="10" ry="5"/>
    <ellipse cx="118" cy="196" rx="10" ry="5" transform="rotate(15,118,196)"/>
    <ellipse cx="130" cy="202" rx="10" ry="5" transform="rotate(30,130,202)"/>
  </g>

  <!-- Om symbol at base -->
  <text x="100" y="215" text-anchor="middle" font-size="11" fill="#C9A84C" font-family="serif" opacity="0.9">ॐ</text>

  <!-- Golden border ring -->
  <circle cx="100" cy="120" r="95" fill="none" stroke="#C9A84C" stroke-width="0.5" stroke-dasharray="3,4" opacity="0.3"/>
</svg>
