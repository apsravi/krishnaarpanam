<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 300" width="240" height="300">
  <defs>
    <radialGradient id="halo" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="50%" stop-color="#FFD600" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF8F00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="skin" cx="42%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="70%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </radialGradient>
    <radialGradient id="crown" cx="50%" cy="10%" r="80%">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="50%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#E65100"/>
    </radialGradient>
    <radialGradient id="silk" x1="0%" y1="0%" x2="0%" y2="100%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="50%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#E65100"/>
    </radialGradient>
    <radialGradient id="lotus2" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="60%" stop-color="#F48FB1"/>
      <stop offset="100%" stop-color="#C2185B"/>
    </radialGradient>
    <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softDrop">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Outer circular background — temple gold rim -->
  <circle cx="120" cy="130" r="115" fill="#FFF8E1" stroke="#FFD600" stroke-width="3"/>
  <circle cx="120" cy="130" r="112" fill="none" stroke="#FF8F00" stroke-width="1" stroke-dasharray="6,5" opacity="0.6"/>

  <!-- Divine halo Prabhamandala -->
  <circle cx="120" cy="108" r="62" fill="url(#halo)" filter="url(#glow2)"/>
  <!-- Halo decorative rings -->
  <circle cx="120" cy="108" r="58" fill="none" stroke="#FFD600" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8"/>
  <circle cx="120" cy="108" r="62" fill="none" stroke="#FFA000" stroke-width="0.8" opacity="0.5"/>
  <!-- Halo rays -->
  <g stroke="#FFD600" stroke-width="1" opacity="0.55">
    <line x1="120" y1="46" x2="120" y2="36"/>
    <line x1="144" y1="52" x2="152" y2="44"/>
    <line x1="161" y1="70" x2="170" y2="64"/>
    <line x1="168" y1="95" x2="178" y2="95"/>
    <line x1="161" y1="121" x2="170" y2="127"/>
    <line x1="96" y1="52" x2="88" y2="44"/>
    <line x1="79" y1="70" x2="70" y2="64"/>
    <line x1="72" y1="95" x2="62" y2="95"/>
    <line x1="79" y1="121" x2="70" y2="127"/>
  </g>

  <!-- === TALL CROWN / KIREEDAM === -->
  <!-- Crown spike -->
  <polygon points="120,30 109,55 131,55" fill="url(#crown)" stroke="#E65100" stroke-width="0.8"/>
  <!-- Crown body -->
  <rect x="104" y="54" width="32" height="16" rx="2" fill="url(#crown)" stroke="#E65100" stroke-width="0.8"/>
  <!-- Crown jewel top -->
  <circle cx="120" cy="40" r="4" fill="#E53935" filter="url(#glow2)"/>
  <circle cx="110" cy="59" r="2.5" fill="#1565C0"/>
  <circle cx="120" cy="61" r="3" fill="#E53935"/>
  <circle cx="130" cy="59" r="2.5" fill="#43A047"/>
  <!-- Crown band base -->
  <rect x="102" y="68" width="36" height="6" rx="2" fill="#FFB300" stroke="#E65100" stroke-width="0.5"/>
  <!-- Crown band gems -->
  <circle cx="111" cy="71" r="2" fill="#E53935"/>
  <circle cx="120" cy="71" r="2.5" fill="#1565C0"/>
  <circle cx="129" cy="71" r="2" fill="#43A047"/>

  <!-- === FACE — Blue divine complexion === -->
  <ellipse cx="120" cy="100" rx="24" ry="26" fill="url(#skin)" stroke="#0D47A1" stroke-width="0.5"/>

  <!-- Forehead tilak -->
  <ellipse cx="120" cy="84" rx="2.5" ry="3.5" fill="#E53935" filter="url(#glow2)"/>
  <!-- Third eye mark -->
  <ellipse cx="120" cy="84" rx="1" ry="1.5" fill="#FFF" opacity="0.7"/>

  <!-- Eyebrows — arched beautifully -->
  <path d="M104,93 Q110,89 116,92" stroke="#0D47A1" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M124,92 Q130,89 136,93" stroke="#0D47A1" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Eyes — large lotus eyes -->
  <ellipse cx="110" cy="97" rx="8" ry="6" fill="white"/>
  <ellipse cx="130" cy="97" rx="8" ry="6" fill="white"/>
  <!-- Iris -->
  <circle cx="110" cy="98" r="4.5" fill="#1A237E"/>
  <circle cx="130" cy="98" r="4.5" fill="#1A237E"/>
  <!-- Pupil -->
  <circle cx="110" cy="98" r="2" fill="#000D" opacity="0.9"/>
  <circle cx="130" cy="98" r="2" fill="#000D" opacity="0.9"/>
  <!-- Eye shine -->
  <circle cx="112" cy="96" r="1.4" fill="white"/>
  <circle cx="132" cy="96" r="1.4" fill="white"/>
  <!-- Eyeliner -->
  <path d="M102,97 Q110,91 118,97" stroke="#0D47A1" stroke-width="0.8" fill="none"/>
  <path d="M122,97 Q130,91 138,97" stroke="#0D47A1" stroke-width="0.8" fill="none"/>

  <!-- Nose -->
  <ellipse cx="120" cy="106" rx="2.5" ry="2" fill="#1565C0" opacity="0.6"/>

  <!-- Smile — divine gentle smile -->
  <path d="M111,114 Q120,120 129,114" fill="#EF9A9A" stroke="#E53935" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Cheek glow -->
  <ellipse cx="104" cy="106" rx="6" ry="4" fill="#F48FB1" opacity="0.2"/>
  <ellipse cx="136" cy="106" rx="6" ry="4" fill="#F48FB1" opacity="0.2"/>

  <!-- === EARRINGS === -->
  <circle cx="96" cy="104" r="5" fill="url(#crown)" stroke="#FF8F00" stroke-width="1"/>
  <circle cx="96" cy="104" r="2.5" fill="#E53935"/>
  <circle cx="144" cy="104" r="5" fill="url(#crown)" stroke="#FF8F00" stroke-width="1"/>
  <circle cx="144" cy="104" r="2.5" fill="#E53935"/>

  <!-- === NECK + NECKLACE === -->
  <rect x="113" y="126" width="14" height="12" rx="2" fill="url(#skin)"/>
  <!-- Kaustubha (divine gem necklace) -->
  <path d="M100,138 Q120,150 140,138" stroke="#FFD600" stroke-width="3" fill="none"/>
  <circle cx="120" cy="148" r="5" fill="#E53935" stroke="#FFD600" stroke-width="1.5" filter="url(#glow2)"/>
  <circle cx="107" cy="144" r="3" fill="#FFD600"/>
  <circle cx="133" cy="144" r="3" fill="#FFD600"/>
  <!-- Second necklace -->
  <path d="M105,132 Q120,140 135,132" stroke="#FFD600" stroke-width="1.5" fill="none" stroke-dasharray="2,2" opacity="0.8"/>

  <!-- === BODY — Pitambara yellow silk === -->
  <path d="M92,140 Q78,175 80,235 L160,235 Q162,175 148,140 Z" fill="url(#silk)" filter="url(#softDrop)"/>
  <!-- Silk texture lines -->
  <path d="M102,146 Q99,185 101,230" stroke="rgba(255,255,255,0.25)" stroke-width="1.8" fill="none"/>
  <path d="M120,146 Q120,185 120,232" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" fill="none"/>
  <path d="M138,146 Q141,185 139,230" stroke="rgba(255,255,255,0.25)" stroke-width="1.8" fill="none"/>
  <!-- Gold border on silk -->
  <path d="M92,140 Q78,175 80,235" stroke="#FFB300" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M148,140 Q162,175 160,235" stroke="#FFB300" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- === FOUR ARMS / HANDS === -->
  <!-- Upper left arm -->
  <path d="M92,142 Q70,150 58,168" stroke="url(#skin)" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- Upper right arm -->
  <path d="M148,142 Q170,150 182,168" stroke="url(#skin)" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- Lower left arm -->
  <path d="M92,160 Q74,172 72,192" stroke="url(#skin)" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- Lower right arm -->
  <path d="M148,160 Q166,172 168,192" stroke="url(#skin)" stroke-width="16" fill="none" stroke-linecap="round"/>

  <!-- Arm ornaments -->
  <ellipse cx="75" cy="159" rx="7" ry="4" fill="#FFD600" stroke="#FF8F00" stroke-width="0.8" transform="rotate(-30 75 159)"/>
  <ellipse cx="165" cy="159" rx="7" ry="4" fill="#FFD600" stroke="#FF8F00" stroke-width="0.8" transform="rotate(30 165 159)"/>

  <!-- === ATTRIBUTES IN HANDS === -->
  <!-- Shankha (Conch shell) — upper left -->
  <ellipse cx="55" cy="175" rx="11" ry="16" fill="white" stroke="#CFD8DC" stroke-width="1" transform="rotate(-15 55 175)"/>
  <path d="M49,164 Q55,173 62,183" stroke="#90A4AE" stroke-width="1" fill="none"/>
  <path d="M51,167 Q57,176 64,186" stroke="#B0BEC5" stroke-width="0.8" fill="none"/>
  <ellipse cx="55" cy="188" rx="5" ry="3" fill="#FFD600" transform="rotate(-15 55 188)"/>

  <!-- Sudarshana Chakra — upper right, spinning/glowing -->
  <circle cx="184" cy="172" r="16" fill="none" stroke="#FFD600" stroke-width="3" filter="url(#glow2)"/>
  <circle cx="184" cy="172" r="10" fill="none" stroke="#FF8F00" stroke-width="1.5"/>
  <circle cx="184" cy="172" r="4" fill="#FF8F00" filter="url(#glow2)"/>
  <!-- Chakra spokes -->
  <g stroke="#FFD600" stroke-width="1.2" opacity="0.9">
    <line x1="184" y1="156" x2="184" y2="148"/>
    <line x1="195" y1="160" x2="202" y2="155"/>
    <line x1="200" y1="172" x2="208" y2="172"/>
    <line x1="195" y1="184" x2="202" y2="189"/>
    <line x1="184" y1="188" x2="184" y2="196"/>
    <line x1="173" y1="184" x2="166" y2="189"/>
    <line x1="168" y1="172" x2="160" y2="172"/>
    <line x1="173" y1="160" x2="166" y2="155"/>
  </g>
  <!-- Chakra inner decorative petals -->
  <circle cx="184" cy="162" r="2" fill="#FFD600" opacity="0.7"/>
  <circle cx="192" cy="172" r="2" fill="#FFD600" opacity="0.7"/>
  <circle cx="184" cy="182" r="2" fill="#FFD600" opacity="0.7"/>
  <circle cx="176" cy="172" r="2" fill="#FFD600" opacity="0.7"/>

  <!-- Gada (Mace) — lower left -->
  <rect x="70" y="185" width="6" height="26" rx="2" fill="#B8860B"/>
  <rect x="68" y="207" width="10" height="6" rx="1" fill="#8B6914"/>
  <ellipse cx="73" cy="185" rx="10" ry="7" fill="#FFD600" stroke="#FF8F00" stroke-width="1"/>
  <circle cx="73" cy="183" r="4" fill="#FF8F00"/>

  <!-- Padma (Lotus) in abhaya — lower right -->
  <g transform="translate(164,192)">
    <!-- Stem -->
    <line x1="0" y1="20" x2="0" y2="8" stroke="#388E3C" stroke-width="2.5"/>
    <!-- Petals -->
    <ellipse cx="0" cy="0" rx="10" ry="6" fill="#F48FB1"/>
    <ellipse cx="0" cy="0" rx="10" ry="6" fill="#F48FB1" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="10" ry="6" fill="#F48FB1" transform="rotate(120)"/>
    <ellipse cx="0" cy="0" rx="10" ry="6" fill="#F48FB1" transform="rotate(180)"/>
    <ellipse cx="0" cy="0" rx="10" ry="6" fill="#F48FB1" transform="rotate(240)"/>
    <ellipse cx="0" cy="0" rx="10" ry="6" fill="#F48FB1" transform="rotate(300)"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="5" fill="#FFD600" filter="url(#glow2)"/>
    <circle cx="0" cy="0" r="2.5" fill="#FF8F00"/>
  </g>

  <!-- === VAIJAYANTIMALA (floral garland) === -->
  <path d="M102,140 Q120,162 138,140" stroke="#43A047" stroke-width="2" fill="none"/>
  <g>
    <circle cx="106" cy="148" r="3" fill="#E91E63"/>
    <circle cx="113" cy="155" r="3" fill="#FFD600"/>
    <circle cx="120" cy="158" r="3.5" fill="#E91E63"/>
    <circle cx="127" cy="155" r="3" fill="#FFD600"/>
    <circle cx="134" cy="148" r="3" fill="#E91E63"/>
  </g>

  <!-- === LOTUS BASE === -->
  <ellipse cx="120" cy="240" rx="44" ry="12" fill="#F48FB1" stroke="#E91E63" stroke-width="1"/>
  <!-- Petals -->
  <ellipse cx="82" cy="238" rx="14" ry="6" fill="#F48FB1" stroke="#E91E63" stroke-width="0.7" transform="rotate(-25 82 238)"/>
  <ellipse cx="100" cy="231" rx="14" ry="6" fill="#F48FB1" stroke="#E91E63" stroke-width="0.7" transform="rotate(-10 100 231)"/>
  <ellipse cx="120" cy="229" rx="14" ry="6" fill="#F48FB1" stroke="#E91E63" stroke-width="0.7"/>
  <ellipse cx="140" cy="231" rx="14" ry="6" fill="#F48FB1" stroke="#E91E63" stroke-width="0.7" transform="rotate(10 140 231)"/>
  <ellipse cx="158" cy="238" rx="14" ry="6" fill="#F48FB1" stroke="#E91E63" stroke-width="0.7" transform="rotate(25 158 238)"/>
  <!-- Inner layer -->
  <ellipse cx="120" cy="237" rx="30" ry="9" fill="#EC407A" opacity="0.5"/>

  <!-- Om symbol -->
  <text x="120" y="254" text-anchor="middle" font-size="13" fill="#C9A84C" font-family="serif" opacity="0.95" filter="url(#glow2)">ॐ</text>

  <!-- Water ripples at base -->
  <ellipse cx="120" cy="248" rx="55" ry="8" fill="none" stroke="#81D4FA" stroke-width="1" opacity="0.4"/>
  <ellipse cx="120" cy="252" rx="65" ry="9" fill="none" stroke="#81D4FA" stroke-width="0.7" opacity="0.25"/>
</svg>
