name: CI — Build & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html && echo "✅ index.html present"
          test -d dist/assets     && echo "✅ assets directory present"
          echo "Build size:"
          du -sh dist/

  deploy-notify:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    name: Deploy status

    steps:
      - name: Confirm deploy eligibility
        run: |
          echo "✅ Build passed — Netlify will auto-deploy from main branch"
          echo "Site: https://krishnaarpanam.netlify.app"
